[workspace]
preview = ["pixi-build"]
authors = [
    "Maximilian Dösch <doesch.maximilian@gmail.com>",
    "Daniel San José Pro <42489409+danielsanjosepro@users.noreply.github.com>"
]
channels = ["https://fast.prefix.dev/conda-forge"]
name = "crisp_gym"
platforms = ["linux-64"]

[activation]
scripts = [
    "scripts/set_env.sh",
]

# ============================================================================
# Shared dependencies (NO python pin here — each feature pins its own version)
# ============================================================================
[dependencies]
compilers = "*"
cmake = "*"
pkg-config = "*"
make = "*"
ninja = "*"
typing_inspect = ">=0.9.0,<0.10"
libstdcxx-ng = ">=12.2.0"

[target.linux.dependencies]
libgl-devel = "*"

# ============================================================================
# Environments
# ============================================================================
[environments]
dev = { features = ["py311", "dev"] }
humble = { features = ["py311", "humble"] }
humble-lerobot = { features = ["py311", "humble", "lerobot", "dev"] }  # incompatible: ROS humble needs numpy <2.0, lerobot 0.4.5 needs >=2.0
lerobot = { features = ["py312", "lerobot"] }
jazzy = { features = ["py312", "jazzy"] }
humble-lerobot-groot = { features = ["py311", "humble", "lerobot-groot", "dev"] }
jazzy-lerobot = { features = ["py312", "jazzy", "lerobot", "dev"] }

# ============================================================================
# Python version features
# ============================================================================
[feature.py311.dependencies]
python = "3.11.*"

[feature.py312.dependencies]
python = "3.12.*"

# ============================================================================
# Dev tools
# ============================================================================
[feature.dev.pypi-dependencies]
pre-commit = "*"
ruff = "*"
debugpy = ">=1.8.14,<2"
pudb = ">=2025.1.3, <2026"

# ============================================================================
# LeRobot feature
# ============================================================================
# [feature.lerobot.activation]
# env = { LD_LIBRARY_PATH = "$CONDA_PREFIX/lib:$LD_LIBRARY_PATH" }

[feature.lerobot.dependencies]
pynput = "*"
# rerun-sdk = "=0.22.1"  # conda-forge maxes at 0.23; lerobot 0.4.5 needs >=0.24 (installed via pip)

[feature.lerobot.pypi-options.dependency-overrides]
numpy = ">=1.26.0"

[feature.lerobot.pypi-dependencies]
# === Working version ===
# lerobot = { git = "https://github.com/huggingface/lerobot", rev = "dacd1d7f5c719c3e56d7b7154a751bef6d5bd23c", extras = ["smolvla"]}
# === Newer version ===
# lerobot = { git = "https://github.com/huggingface/lerobot", rev = "74690e3f56a90b6ea314afbfb3b801a3d842a005", extras = ["smolvla"]}
# === Local version ===
lerobot = { path = "../clare_rebuttal/lerobot/", editable = true }
# lerobot = { path = "../clare_rebuttal/lerobot_lsy/", editable = true }

# ============================================================================
# LeRobot with GR00T feature
# ============================================================================
[feature.lerobot-groot.dependencies]
pynput = "*"

[feature.lerobot-groot.pypi-options.dependency-overrides]
numpy = ">=1.26.0"

[feature.lerobot-groot.pypi-dependencies]
lerobot = { path = "../clare_rebuttal/lerobot/", editable = true, extras = ["groot"] }

# ============================================================================
# ROS2 Humble (Python 3.11)
# ============================================================================
[feature.humble]
channels = ["https://prefix.dev/robostack-humble"]

[feature.humble.dependencies]
ros-humble-desktop = "*"
colcon-common-extensions = "*"
ros-humble-ros2-control = "*"
ros-humble-ros2-controllers = "*"
rosdep = "*"
ros-humble-rmw-cyclonedds-cpp = "*"
ros-humble-image-transport-plugins = "*"

# ============================================================================
# ROS2 Jazzy (Python 3.12)
# ============================================================================
[feature.jazzy]
channels = ["https://prefix.dev/robostack-jazzy"]

[feature.jazzy.dependencies]
ros-jazzy-desktop = "*"
ros-jazzy-ros2-control = "*"
ros-jazzy-ros2-controllers = "*"
colcon-common-extensions = "*"
rosdep = "*"
ros-jazzy-rmw-cyclonedds-cpp = "*"
# ros-jazzy-rmw-zenoh-cpp = "*"  # incompatible: requires numpy <2.0

# ============================================================================
# Project itself
# ============================================================================
[pypi-dependencies]
crisp_gym = { path = ".", editable = true }
# crisp_python = { path = "../crisp_py", editable = true }

[tasks]
configure = "bash scripts/configure.sh"
