[workspace]
preview = ["pixi-build"]
authors = [
    "Maximilian Dösch <doesch.maximilian@gmail.com>",
    "Daniel San José Pro <42489409+danielsanjosepro@users.noreply.github.com>"
]
channels = ["conda-forge"]
name = "crisp_gym"
platforms = ["linux-64"]

[activation]
scripts = [
    "scripts/set_env.sh",
]
# Keep DDS discovery scoped to localhost so the real robot on the network
# doesn't leak into local sim/test runs. Override via task-level env for
# real-robot recording.
env = { ROS_AUTOMATIC_DISCOVERY_RANGE = "LOCALHOST" }

[dependencies]
compilers = "*"
cmake = "*"
pkg-config = "*"
make = "*"
ninja = "*"
typing_inspect = ">=0.9.0,<0.10"
# libstdcxx-ng = ">=12.2.0"  # legacy package name; modern robostack-jazzy 3.12 builds require `libstdcxx >=14` instead. Re-enable if something breaks.


[target.linux.dependencies]
libgl-devel = "*"

[environments]
dev = { features = ["dev"] }
humble = { features = ["humble"] }
# humble-lerobot disabled: lerobot v0.5.1 requires python >=3.12 but humble is py3.11.
# Re-enable by feature-splitting (lerobot-v3 / lerobot-v5 with different pins) if needed.
# humble-lerobot = { features = ["humble", "lerobot", "dev"] }
lerobot = { features = ["lerobot"] }                           # standalone (no ROS); numpy ceiling lives on feature.lerobot
jazzy = { features = ["jazzy"] }
jazzy-lerobot = { features = ["jazzy", "lerobot", "dev"] }

[feature.dev.pypi-dependencies]
pre-commit = "*"
ruff = "*"
debugpy = ">=1.8.14,<2"
pudb = ">=2025.1.3, <2026"

[feature.lerobot.dependencies]
pynput = "*"
rerun-sdk = ">=0.24.0,<0.27.0"  # lerobot v0.5.1 requires rerun-sdk in this range
packaging = "<26"                # lerobot v0.5.1 caps packaging<26.0; conda-forge default is 26.1, so pin older
numpy = ">=2.0,<2.3"             # lerobot v0.5.1 wants numpy <2.3; ros-jazzy np2py312 accepts 2.0-2.2 at runtime

[feature.lerobot.pypi-dependencies]
# === Working version (pinned) ===
lerobot = { git = "https://github.com/huggingface/lerobot", rev = "v0.5.1", extras = ["smolvla"] }
# torch>=2.9 cascades torchcodec to >=0.8.1, which is the first torchcodec
# with ffmpeg 8 support — lets us use the rest of the v0.5.1 dep chain
# (rerun-sdk 0.26 + ffmpeg 8) without a separate ffmpeg pin.
torch = ">=2.9,<2.11"
torchcodec = ">=0.8.1,<0.11"    # v0.8.1 is the first torchcodec with ffmpeg 8 support; pip was picking 0.5 without this
# v0.5.1 requires python >=3.12 — incompatible with humble-lerobot (py3.11).
# Comment that env out or pin a separate v0.3.x feature if you need it back.
# === Previous pin ===
# lerobot = { git = "https://github.com/huggingface/lerobot", rev = "v0.3.3", extras = ["smolvla"] }
# === Local version (path doesn't exist on this machine) ===
# lerobot = { path = "../clare_rebuttal/lerobot_lsy/", editable = true }

[feature.humble]
channels = ["https://prefix.dev/robostack-humble"]

[feature.humble.dependencies]
python = "3.11.*"            # robostack-humble targets Python 3.11
libstdcxx-ng = "*"           # humble-era packages still reference the legacy name; explicit so the solver always sees it
ros-humble-desktop = "*"
colcon-common-extensions = "*"
ros-humble-ros2-control = "*"
ros-humble-ros2-controllers = "*"
rosdep = "*"
ros-humble-rmw-cyclonedds-cpp = "*"
ros-humble-image-transport-plugins = "*"

[feature.jazzy]
channels = ["https://prefix.dev/robostack-jazzy"]

[feature.jazzy.dependencies]
# Jazzy officially targets Python 3.12 (Ubuntu 24.04 Noble). robostack-jazzy
# ships 3.12 builds (tag np2py312) that also unlock fastrtps 2.14.5 +
# openssl >= 3.6.1, matching the sim env exactly.
python = "3.12.*"
numpy = "<=2.3"              # crisp_py constraint
ros-jazzy-desktop = "*"
ros-jazzy-fastrtps = ">=2.14.5"   # match sim env
ros-jazzy-ros2-control = "*"
ros-jazzy-ros2-controllers = "*"
colcon-common-extensions = "*"
rosdep = "*"
ros-jazzy-rmw-cyclonedds-cpp = "*"
# ros-jazzy-rmw-zenoh-cpp removed: pins numpy<2.0, libzenohc unresolvable on
# robostack-jazzy. Re-add if zenoh is actually needed.
# ros-jazzy-rmw-zenoh-cpp = "*"

[pypi-dependencies]
crisp_gym = { path = ".", editable = true }
crisp_python = { path = "../crisp_py", editable = true }

[tasks]
configure = "bash scripts/configure.sh"
